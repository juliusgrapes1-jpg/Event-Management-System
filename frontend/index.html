 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #0b168f, #1d4ed8);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 400px;
    background: #fff;
    border-radius: 18px;
    padding: 25px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.25);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: #163c7a;
    color: white;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #0f2f5f;
}

.error-msg {
    color: red;
    font-size: 13px;
    text-align: center;
    margin-top: 5px;
}

.bottom-text {
    margin-top: 15px;
    text-align: center;
    font-size: 14px;
}

.bottom-text a {
    color: #163c7a;
    font-weight: bold;
    text-decoration: none;
}

.bottom-text a:hover {
    text-decoration: underline;
}

@media (max-width: 480px) {
    .container {
        padding: 18px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h2>LOGIN</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <div class="error-msg" id="error-msg"></div>

    <button onclick="validateLogin()">Login</button>

    <div class="bottom-text">
        Don’t have an account?
        <a href="register.html">Create account</a>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
