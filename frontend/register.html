<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #230dcc;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 450px;
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #5f93b4;
}

.btn {
    width: 100%;
    padding: 12px;
    background: #163c7a;
    color: white;
    border: none;
    border-radius: 20px;
    margin-top: 10px;
    cursor: pointer;
}

.btn:hover {
    background: #0f2f5f;
}

a {
    display: block;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

    <h2>REGISTER</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <input type="email" id="email" placeholder="Email">

    <button class="btn" onclick="registerUser()">Register</button>

    <a href="index.html">Already have an account? Login</a>

</div>

<script src="script.js"></script>

</body>
</html>
